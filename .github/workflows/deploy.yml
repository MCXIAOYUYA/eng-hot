name: Deploy to Pages

# 触发时机:
#  - 推代码到 main(手动改动)
#  - "Refresh data" 每日刷新完成后(数据更新自动重新部署)
#  - Actions 页手动触发
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Refresh data"]
    types: [completed]
  workflow_dispatch: {}

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只保留最新一次部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 若是 Refresh data 触发,仅在其成功时才部署
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        # 用 npm install 而非 npm ci:package-lock.json 在 Windows 生成,
        # 只含 win32 平台的原生二进制(rollup/esbuild);npm ci 严格照锁文件安装,
        # 在 Linux runner 上会缺 @rollup/rollup-linux-x64-gnu 导致 vite build 失败。
        # npm install 会按 runner 实际平台补齐 optional 依赖。
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
